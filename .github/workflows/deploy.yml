name: CI/CD - Chest X-ray AI

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Fix Node warning

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # ✅ Instead of running full Streamlit (which fails in CI),
    # we just check imports
    - name: Basic Import Test
      run: |
        python -c "import streamlit, tensorflow, cv2, numpy"

    # ✅ Optional lightweight app check
    - name: Check App File Exists
      run: |
        test -f streamlit_app/app.py